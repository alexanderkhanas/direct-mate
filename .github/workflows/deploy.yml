name: Deploy to Production

on:
  push:
    branches: [main]
  # Manual trigger for the seed-demo job below. Push events run build + deploy
  # only; seed-demo is skipped because it hard-deletes and rebuilds the demo
  # tenants — wasteful on every push. Run it manually from the Actions tab
  # when shipping a demo-tenant change (new vertical, schema migration that
  # affects demo data, etc.).
  workflow_dispatch:

env:
  SERVER_HOST: ${{ secrets.SERVER_HOST }}
  SERVER_USER: root
  DEPLOY_PATH: /opt/directmate

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build shared package
        run: cd packages/shared && npm run build

      - name: Build API
        run: cd apps/api && npm run build

      - name: Build Admin
        run: cd apps/admin && npm run build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $SERVER_HOST >> ~/.ssh/known_hosts

      - name: Sync code to server
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='apps/api/dist' \
            --exclude='apps/admin/dist' \
            --exclude='apps/api/.env' \
            --exclude='infra/production/.env' \
            --exclude='apps/api/conversations.log' \
            --exclude='apps/api/uploads' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ $SERVER_USER@$SERVER_HOST:$DEPLOY_PATH/

      - name: Restore vsftpd config ownership
        # vsftpd refuses to start unless its config file is owned by root
        # ("500 OOPS: config file not owned by correct user"). rsync runs
        # as the deploy user (uid 1001) and stamps that ownership on every
        # file it ships, including the bind-mounted vsftpd.conf. Without
        # this chown the ftp container crash-loops after every deploy.
        run: |
          ssh -i ~/.ssh/deploy_key $SERVER_USER@$SERVER_HOST \
            "chown root:root $DEPLOY_PATH/infra/production/vsftpd/vsftpd.conf $DEPLOY_PATH/infra/production/vsftpd/entrypoint.sh"

      - name: Render nginx config (substitute DOMAIN placeholder)
        # rsync ships nginx/conf.d/default.conf with ${DOMAIN} placeholders.
        # Substitute them on the server using DOMAIN from .env so nginx can
        # actually parse the file. Mirrors what infra/production/deploy.sh does.
        run: |
          ssh -i ~/.ssh/deploy_key $SERVER_USER@$SERVER_HOST \
            'cd /opt/directmate/infra/production && \
             set -a && . ./.env && set +a && \
             sed -i "s|\${DOMAIN}|$DOMAIN|g" nginx/conf.d/default.conf'

      - name: Build Docker images on server
        run: |
          ssh -i ~/.ssh/deploy_key $SERVER_USER@$SERVER_HOST \
            "cd /opt/directmate/infra/production && docker compose -f docker-compose.prod.yml build"

      - name: Run migrations
        run: |
          ssh -i ~/.ssh/deploy_key $SERVER_USER@$SERVER_HOST \
            'cd /opt/directmate/infra/production && docker compose -f docker-compose.prod.yml run --rm api node -e "const d=require(\"./dist/database/data-source\");d.AppDataSource.initialize().then(s=>s.runMigrations()).then(()=>{console.log(\"OK\");process.exit(0)}).catch(e=>{console.error(e.message);process.exit(1)})"'

      - name: Restart services
        run: |
          ssh -i ~/.ssh/deploy_key $SERVER_USER@$SERVER_HOST \
            "cd /opt/directmate/infra/production && docker compose -f docker-compose.prod.yml up -d --remove-orphans && docker image prune -f"

      - name: Reload nginx
        # `docker compose up -d --remove-orphans` only recreates containers
        # whose images changed. nginx config is mounted from disk, so config
        # changes need an explicit reload (no downtime, soft reload).
        run: |
          ssh -i ~/.ssh/deploy_key $SERVER_USER@$SERVER_HOST \
            "docker exec production-nginx-1 nginx -t && docker exec production-nginx-1 nginx -s reload"

  seed-demo:
    # Manual-only. Hard-deletes legacy `slug='demo'` (cascades through 25 FKs)
    # and rebuilds `demo-women-clothes` + `demo-cosmetics` from the TS template
    # files + product data. Idempotent on re-run, but each run does real work
    # (DELETE + INSERT) so don't fire on every push.
    #
    # Restart api after the seed so DemoService.onModuleInit picks up the new
    # is_demo=true tenants (boot-time cache).
    needs: deploy
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $SERVER_HOST >> ~/.ssh/known_hosts

      - name: Run demo seeds
        run: |
          ssh -i ~/.ssh/deploy_key $SERVER_USER@$SERVER_HOST \
            "cd /opt/directmate/infra/production && docker compose -f docker-compose.prod.yml run --rm api npm run seed:demo:prod:all"

      - name: Restart api so DemoService picks up new tenants
        run: |
          ssh -i ~/.ssh/deploy_key $SERVER_USER@$SERVER_HOST \
            "cd /opt/directmate/infra/production && docker compose -f docker-compose.prod.yml restart api"

      - name: Verify demo tenants exist
        run: |
          ssh -i ~/.ssh/deploy_key $SERVER_USER@$SERVER_HOST \
            "docker exec production-postgres-1 psql -U postgres -d directmate -c \"SELECT slug, is_demo, flow_config -> 'businessType' AS bt, flow_config -> 'preQualifyStrategy' AS strat FROM tenants t JOIN store_configs sc ON sc.tenant_id=t.id WHERE t.slug LIKE 'demo%' ORDER BY t.slug;\""

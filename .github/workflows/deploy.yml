name: Deploy to Production

on:
  push:
    branches: [main]

env:
  SERVER_HOST: ${{ secrets.SERVER_HOST }}
  SERVER_USER: root
  DEPLOY_PATH: /opt/directmate

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build shared package
        run: cd packages/shared && npm run build

      - name: Build API
        run: cd apps/api && npm run build

      - name: Build Admin
        run: cd apps/admin && npm run build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $SERVER_HOST >> ~/.ssh/known_hosts

      - name: Sync code to server
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='apps/api/dist' \
            --exclude='apps/admin/dist' \
            --exclude='apps/api/.env' \
            --exclude='infra/production/.env' \
            --exclude='apps/api/conversations.log' \
            --exclude='apps/api/uploads' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ $SERVER_USER@$SERVER_HOST:$DEPLOY_PATH/

      - name: Build Docker images on server
        run: |
          ssh -i ~/.ssh/deploy_key $SERVER_USER@$SERVER_HOST \
            "cd /opt/directmate/infra/production && docker compose -f docker-compose.prod.yml build"

      - name: Run migrations
        run: |
          ssh -i ~/.ssh/deploy_key $SERVER_USER@$SERVER_HOST \
            'cd /opt/directmate/infra/production && docker compose -f docker-compose.prod.yml run --rm api node -e "const d=require(\"./dist/database/data-source\");d.AppDataSource.initialize().then(s=>s.runMigrations()).then(()=>{console.log(\"OK\");process.exit(0)}).catch(e=>{console.error(e.message);process.exit(1)})"'

      - name: Restart services
        run: |
          ssh -i ~/.ssh/deploy_key $SERVER_USER@$SERVER_HOST \
            "cd /opt/directmate/infra/production && docker compose -f docker-compose.prod.yml up -d --remove-orphans && docker image prune -f"

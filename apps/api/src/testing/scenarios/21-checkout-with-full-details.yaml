name: "Full checkout with delivery details"
messages:
  - customer: "Хочу Silk Color помаду Nude Pink"
    expect:
      scenario_in: [show_products, confirm_selection]
      contains: "Silk Color"

  - customer: "так"
    expect:
      scenario_in: [confirm_selection, collect_checkout_info, order_confirmed_ask_delivery]

  - customer: "Петренко Іван, 0501234567, Одеса, відділення 12"
    expect:
      scenario: confirm_order
      contains: ["Петренко", "Одеса"]

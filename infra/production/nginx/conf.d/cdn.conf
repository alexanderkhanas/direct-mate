# CDN vhost — public read-only access to product images uploaded via FTP.
#
# URL pattern:  https://cdn.directmate.app/{tenant}/images/{filename}
# Filesystem:   /srv/directmate-ftp/{tenant}/images/{filename}
#
# Hardening:
#   - Only /<tenant>/images/<file>.<ext> with image extensions is exposed.
#     Everything else (including /<tenant>/sync/*) returns 404.
#   - Dotfiles (.git, .env, ...) blocked.
#   - Directory listing disabled (autoindex off).
#   - CORS open (Instagram fetcher + DirectMate bot need cross-origin reads).

# HTTP — ACME challenge + redirect to HTTPS
server {
    listen 80;
    server_name cdn.directmate.app;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — image origin
server {
    listen 443 ssl http2;
    server_name cdn.directmate.app;

    ssl_certificate     /etc/letsencrypt/live/cdn.directmate.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cdn.directmate.app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /srv/directmate-ftp;
    autoindex off;
    server_tokens off;

    access_log /var/log/nginx/cdn.directmate.app.access.log;
    error_log  /var/log/nginx/cdn.directmate.app.error.log warn;

    # Block dotfiles anywhere in the path.
    location ~ /\. {
        return 404;
    }

    # Whitelist: /<tenant>/images/<file>.<ext> only.
    # Extension match is case-insensitive (the disk has both .jpg and .JPG —
    # nginx serves whichever filename actually exists; case-insensitive *match*
    # here just means the route fires for both casings).
    location ~* "^/[^/]+/images/[^/]+\.(jpe?g|png|webp|gif)$" {
        try_files $uri =404;

        # 1-day browser/proxy cache. Files at a given path are content-stable
        # (Torgsoft re-uploads with same filename = same image content per
        # GoodID), so 1 day balances freshness vs. egress.
        add_header Cache-Control "public, max-age=86400" always;

        # Open CORS — Instagram + DirectMate bot need cross-origin reads.
        add_header Access-Control-Allow-Origin "*" always;

        # Defensive: prevent MIME sniffing.
        add_header X-Content-Type-Options "nosniff" always;

        # ETag + Last-Modified are emitted by nginx for static files by default.
    }

    # Catch-all: anything not whitelisted (sync/, root, wrong extensions,
    # directory paths) returns 404. Matches AFTER more specific regex above
    # (regex locations take precedence over the prefix `/`).
    location / {
        return 404;
    }
}

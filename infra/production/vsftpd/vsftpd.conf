# DirectMate vsftpd config (virtual users mode, multi-tenant).
#
# Mounted RO into the fauria/vsftpd container at /etc/vsftpd/vsftpd.conf.
# Replaces the env-var-driven config that fauria's default entrypoint
# would otherwise generate. Dynamic settings (PASV addr/ports,
# local_umask) are passed at runtime via `vsftpd -o key=value` from our
# custom entrypoint so they remain configurable through compose .env.
#
# Per-tenant overrides (one file per FTP login under
# /etc/vsftpd/user_conf.d/<username>) set local_root to that tenant's
# /srv/directmate-ftp/<slug>/ root. See user_config_dir below.

# Foreground (Docker-friendly).
background=NO

anonymous_enable=NO
local_enable=YES
write_enable=YES

# Virtual users via PAM + Berkeley DB hash. The DB file is mounted from
# /srv/directmate-ftp/.config/virtual_users.db and regenerated by the
# add-tenant.sh / remove-tenant.sh CLI scripts. pam_userdb opens the
# file on every auth, so DB regen takes effect for the next login
# without a daemon restart.
guest_enable=YES
virtual_use_local_privs=YES
pam_service_name=vsftpd_virtual

# Default chroot for a virtual user — overridden per-user via
# user_config_dir below to point at the tenant's storage tree.
user_sub_token=$USER
local_root=/home/vsftpd/$USER

chroot_local_user=YES
allow_writeable_chroot=YES

hide_ids=YES
xferlog_enable=YES
xferlog_file=/var/log/vsftpd.log

# Per-user overrides — one file per username inside this directory.
# Mounted from /srv/directmate-ftp/.config/user_conf.d.
user_config_dir=/etc/vsftpd/user_conf.d

# Standard hardening.
seccomp_sandbox=NO
listen=YES
listen_ipv6=NO
pasv_enable=YES

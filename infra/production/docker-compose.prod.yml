version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-directmate}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../../
      dockerfile: infra/production/api.prod.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-directmate}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      META_APP_ID: ${META_APP_ID}
      META_APP_SECRET: ${META_APP_SECRET}
      META_WEBHOOK_VERIFY_TOKEN: ${META_WEBHOOK_VERIFY_TOKEN}
      INSTAGRAM_OAUTH_REDIRECT_URI: ${INSTAGRAM_OAUTH_REDIRECT_URI}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      OPENAI_FALLBACK_MODEL: ${OPENAI_FALLBACK_MODEL:-gpt-4.1}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      ADMIN_BASE_URL: https://${DOMAIN}
      ADMIN_ORIGIN: https://${DOMAIN}
      BACKEND_BASE_URL: http://api:3000
      N8N_ORDER_SYNC_WEBHOOK_URL: ${N8N_ORDER_SYNC_WEBHOOK_URL}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-DirectMateBot}
      DEMO_DEBOUNCE_MS: ${DEMO_DEBOUNCE_MS:-1500}
      DEMO_MAX_MESSAGE_LENGTH: ${DEMO_MAX_MESSAGE_LENGTH:-500}
      DEMO_RATE_LIMIT_SESSIONS_PER_HOUR: ${DEMO_RATE_LIMIT_SESSIONS_PER_HOUR:-5}
      DEMO_BUDGET_CENTS_GPT54_MINI: ${DEMO_BUDGET_CENTS_GPT54_MINI:-1500}
      DEMO_BUDGET_CENTS_GPT54: ${DEMO_BUDGET_CENTS_GPT54:-500}
      DEMO_CORS_ALLOWED_ORIGINS: ${DEMO_CORS_ALLOWED_ORIGINS:-https://${DOMAIN}}
      # CLIP image embeddings via onnxruntime. Set CLIP_ENABLED=false
      # to disable when ORT misbehaves under load (SIGSEGV during
      # catalog-import). pHash + GPT vision still handle customer-photo
      # matching with graceful degradation.
      CLIP_ENABLED: ${CLIP_ENABLED:-true}
    volumes:
      - uploads:/app/apps/api/uploads
      - logs:/app/apps/api/logs
    networks:
      - internal

  admin:
    build:
      context: ../../
      dockerfile: infra/production/admin.prod.Dockerfile
      args:
        VITE_POSTHOG_KEY: ${VITE_POSTHOG_KEY:-}
        VITE_POSTHOG_HOST: ${VITE_POSTHOG_HOST:-https://eu.i.posthog.com}
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_etc:/etc/letsencrypt
      - certbot_var:/var/lib/letsencrypt
      - certbot_www:/var/www/certbot
      # CDN — read-only access to FTP-uploaded product images.
      # Served by cdn.directmate.app vhost (see nginx/conf.d/cdn.conf).
      - /srv/directmate-ftp:/srv/directmate-ftp:ro
    depends_on:
      - api
      - admin
    networks:
      - internal

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_etc:/etc/letsencrypt
      - certbot_var:/var/lib/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  ftp:
    image: fauria/vsftpd
    restart: unless-stopped
    # Custom entrypoint bypasses fauria's env-var-driven config generator
    # (which would clobber our mounted vsftpd.conf). See infra/production/
    # vsftpd/entrypoint.sh for what it does.
    entrypoint: /usr/sbin/dm-entrypoint.sh
    ports:
      - "21:21"
      - "21100-21110:21100-21110"
    environment:
      PASV_ADDRESS: ${FTP_PASV_ADDRESS}
      PASV_MIN_PORT: 21100
      PASV_MAX_PORT: 21110
      # 022 → uploaded files get mode 644 (world-readable). Required so the
      # nginx CDN worker (different UID) can serve images straight from this
      # bind-mounted directory. Without this, new uploads land as mode 600
      # and the CDN returns 403.
      LOCAL_UMASK: "022"
    volumes:
      # Static config (repo-managed).
      - ./vsftpd/vsftpd.conf:/etc/vsftpd/vsftpd.conf:ro
      - ./vsftpd/entrypoint.sh:/usr/sbin/dm-entrypoint.sh:ro
      # Runtime state (operator-managed via scripts/ftp/* CLIs).
      # users.txt and virtual_users.db live in this dir; the .db is
      # regenerated by add-tenant.sh / remove-tenant.sh.
      - /srv/directmate-ftp/.config/virtual_users.db:/etc/vsftpd/virtual_users.db:ro
      - /srv/directmate-ftp/.config/user_conf.d:/etc/vsftpd/user_conf.d:ro
      # Tenant storage trees — single mount covers every tenant's chroot
      # since per-user conf files set local_root to /srv/directmate-ftp/
      # <slug>/.
      - /srv/directmate-ftp:/srv/directmate-ftp
    healthcheck:
      test: ["CMD-SHELL", "pgrep vsftpd > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - internal

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      N8N_HOST: ${DOMAIN}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      N8N_PATH: /n8n/
      WEBHOOK_URL: https://${DOMAIN}/n8n/
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_DB:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-postgres}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      GENERIC_TIMEZONE: Europe/Kyiv
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

volumes:
  postgres_data:
  uploads:
  logs:
  certbot_etc:
  certbot_var:
  certbot_www:
  n8n_data:

networks:
  internal:
